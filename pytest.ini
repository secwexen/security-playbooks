[pytest]
minversion = 7.0
addopts =
    -ra
    -q
    --strict-markers
    --disable-warnings
    --color=yes
    --cov=security_playbooks
    --cov-report=term-missing
    --cov-report=xml

testpaths =
    tests
    src/security_playbooks/testing

pythonpath =
    src

python_files = test_*.py
python_classes = Test*
python_functions = test_*

norecursedirs =
    .git
    .venv
    venv
    dist
    build
    __pycache__

markers =
    unit: fast unit tests
    integration: integration tests involving multiple components
    slow: slow-running tests (end-to-end or full pipeline)
    security: security-focused detection tests
    playbook: playbook execution tests
    pipeline: detection pipeline tests

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
