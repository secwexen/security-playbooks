name: "Performance Issue"
description: "Report performance degradation or bottlenecks"
title: "[PERF] - "
labels: ["performance"]
body:
  - type: textarea
    id: description
    attributes:
      label: Issue Description
      description: Describe the performance problem.
  - type: textarea
    id: metrics
    attributes:
      label: Metrics
      description: Include logs, response times, CPU/RAM usage, DB query times, etc.
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: How can this issue be reproduced?
  - type: textarea
    id: expected
    attributes:
      label: Expected Performance
      description: What performance level should be achieved?
